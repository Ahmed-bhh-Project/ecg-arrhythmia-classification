<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Classificateur ECG{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block extra_css %}{% endblock %}
</head>

<body>
  <!-- Barre de navigation améliorée -->
  <div class="navbar">
    <div class="logo">
      <i class="fas fa-heartbeat"></i> CardioScan
    </div>
    <div class="nav-links">
      <a href="/about"><i class="fas fa-home"></i> Accueil</a>
      <a href="/info"><i class="fas fa-info-circle"></i> Informations</a>
      <a href="/upload"><i class="fas fa-heart-pulse"></i> Analyse</a>
    </div>
  </div>

  <!-- Bloc principal -->
  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <!-- Pied de page -->
  <footer>
    <p>&copy; 2025 CardioScan - Analyse d'ECG par Intelligence Artificielle</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
